<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dos A Cloud | Descarga tus fotos</title>
    <!-- Agregando tu Favicon de la carpeta assets -->
    <link rel="icon" type="image/png" href="assets/dosa-icon.png">

    <style>
        /* --- IMPORTACIÓN DE TUS FUENTES NEXA --- */
        @font-face {
            font-family: 'Nexa';
            src: url('assets/Nexa-Heavy.ttf') format('truetype');
            font-weight: 800; /* Para títulos y botones */
            font-style: normal;
        }

        @font-face {
            font-family: 'Nexa';
            src: url('assets/Nexa-ExtraLight.ttf') format('truetype');
            font-weight: 300; /* Para textos delgados */
            font-style: normal;
        }

        /* --- VARIABLES DE COLOR --- */
        :root {
            --blanco: #f8f8fa;
            --negro: #121212;
            --acento: #3a0ca3; 
            --acento-aux1: #4361ee;
            --acento-aux2: #7209b7;
            --exito: #06d6a0; 
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            /* Aplicando tu fuente como principal */
            font-family: 'Nexa', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--negro); color: var(--blanco);
            height: 100vh; width: 100vw; overflow: hidden; position: relative;
        }

        /* --- FONDO DE ORBES (MÁS VIVOS) --- */
        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 0;
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(60px);
            animation: floatOrb 8s infinite ease-in-out alternate;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--acento); top: -5%; left: 0%; animation-duration: 10s; }
        .orb-2 { width: 300px; height: 300px; background: var(--acento-aux2); bottom: 5%; right: -5%; animation-duration: 12s; animation-delay: -3s; }
        .orb-3 { width: 250px; height: 250px; background: var(--acento-aux1); top: 40%; left: 60%; animation-duration: 8s; animation-delay: -5s; }
        .orb-4 { width: 320px; height: 320px; background: var(--acento); bottom: 20%; left: -10%; animation-duration: 11s; animation-delay: -7s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, -50px) scale(1.1); }
            66% { transform: translate(-60px, 80px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .content-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow-y: auto; padding: 20px; z-index: 10;
        }

        /* --- EXTREME LIQUID GLASS --- */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            
            /* Aumentamos el desenfoque a 40px y saturamos los colores al 200% para ese efecto Apple vibrante */
            backdrop-filter: blur(40px) saturate(200%); 
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            
            /* Biselado de luz ultrafino */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            
            border-radius: 32px;
            /* Sombra ultra profunda para flotabilidad */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.1);
            padding: 45px 35px;
            text-align: center; width: 100%; max-width: 420px; flex-shrink: 0;
            animation: springIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes springIn {
            0% { opacity: 0; transform: scale(0.85) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- LOGO --- */
        .logo-img {
            max-width: 220px; width: 100%; height: auto;
            margin: 0 auto 25px auto; display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }

        /* Fuente ligera para las descripciones */
        .hero-description {
            margin-bottom: 30px; font-size: 16px; line-height: 1.5;
            color: rgba(248, 248, 250, 0.85); font-weight: 300;
        }

        /* --- BOTONES --- */
        .btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.04) 100%);
            color: var(--blanco); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 24px; border-radius: 50px;
            font-size: 16px; font-weight: 800; /* Fuente Heavy */
            letter-spacing: 0.5px; cursor: pointer;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 100%;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.1) 100%);
            transform: scale(1.03); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }

        .btn:active { transform: scale(0.95); transition: all 0.1s; }

        .btn-primary {
            background: linear-gradient(135deg, var(--acento) 0%, #2b087a 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.3);
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(58, 12, 163, 0.4);
        }

        .btn-primary:hover { background: linear-gradient(135deg, #4a15c3 0%, var(--acento) 100%); }

        /* --- VENTANA MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            transform: scale(0.8) translateY(30px); opacity: 0;
            width: 100%; max-width: 420px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }

        /* --- BOTÓN X CERRAR --- */
        .close-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 34px; height: 34px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease;
            z-index: 10;
        }
        .close-btn:hover { transform: scale(1.15); background: rgba(255, 255, 255, 0.2); }

        .x-icon { position: relative; width: 12px; height: 12px; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .x-icon::before, .x-icon::after {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1.5px;
            background: #fff; border-radius: 2px;
        }
        .x-icon::before { transform: translateY(-50%) rotate(45deg); }
        .x-icon::after { transform: translateY(-50%) rotate(-45deg); }

        .close-btn.is-clicked { background-color: #ef233c !important; transform: scale(0.85) !important; }
        .close-btn.is-clicked .x-icon { transform: rotate(180deg); }

        /* --- INPUT --- */
        .input-code {
            width: 100%; padding: 18px; border-radius: 16px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(0, 0, 0, 0.6);
            color: var(--blanco); font-size: 18px; text-align: center;
            outline: none; margin-top: 15px;
            transition: all 0.3s ease; letter-spacing: 2px;
            font-weight: 300; /* Fuente Nexa ligera */
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.4);
        }
        .input-code:focus {
            background: rgba(0, 0, 0, 0.5); border-color: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.4), 0 0 20px rgba(58, 12, 163, 0.5);
        }

        /* --- LOADER Y ESTADOS --- */
        .loader-container { display: none; flex-direction: column; align-items: center; margin-top: 25px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.05); border-top: 4px solid var(--acento);
            border-radius: 50%; margin-bottom: 20px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-msg { font-size: 16px; margin-bottom: 15px; text-align: center; font-weight: 300; transition: all 0.3s ease; }

        /* --- SVGs ANIMADOS (¡LÍNEA CONTINUA PERFECTA!) --- */
        .icon-svg {
            width: 65px; height: 65px;
            display: none; margin-bottom: 15px;
        }

        /* Vector para el Check (Éxito) */
        .success-svg { filter: drop-shadow(0 0 12px rgba(6, 214, 160, 0.6)); }
        .success-path {
            stroke: var(--exito); stroke-width: 4;
            stroke-linecap: round; stroke-linejoin: round;
            /* Longitud total del trazo SVG */
            stroke-dasharray: 60; stroke-dashoffset: 60; 
        }
        .success-svg.show-icon .success-path {
            /* Al animar el offset a 0, se dibuja fluidamente como un solo trazo */
            animation: drawContinuous 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Vector para la X (Error) */
        .error-svg { filter: drop-shadow(0 0 12px rgba(239, 35, 60, 0.6)); }
        .error-path {
            stroke: #ef233c; stroke-width: 4; stroke-linecap: round;
            stroke-dasharray: 40; stroke-dashoffset: 40;
        }
        .error-svg.show-icon .path-1 { animation: drawContinuous 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .error-svg.show-icon .path-2 { animation: drawContinuous 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards; }

        /* Animación mágica de dibujo */
        @keyframes drawContinuous { 100% { stroke-dashoffset: 0; } }

        @media (max-width: 380px) {
            .glass-card { padding: 35px 25px; }
            .logo-img { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="content-wrapper">
        <div class="glass-card">
            <!-- RUTAS ACTUALIZADAS PARA TU CARPETA ASSETS -->
            <img src="assets/dosa-cloud.png" alt="Dos A Cloud" class="logo-img">
            
            <p class="hero-description">Accede a tu galería privada ingresando tu código de evento.</p>
            <button class="btn" onclick="openModal()">Insertar código</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="glass-card modal-content" style="animation: none;"> 
            
            <button class="close-btn" id="closeBtn" onclick="closeModalConAnimacion()">
                <span class="x-icon"></span>
            </button>
            
            <div id="view-input">
                <h2 style="font-size: 26px; margin-bottom: 5px; font-weight: 800;">Buscar Galería</h2>
                <p style="font-size: 14px; opacity: 0.7; font-weight: 300;">Ingresa el código proporcionado</p>
                <input type="text" id="codigoInput" class="input-code" placeholder="Ej. BODA2026" autocomplete="off">
                <button class="btn btn-primary" onclick="buscarCodigo()">Buscar código</button>
            </div>

            <div id="view-status" class="loader-container">
                <div id="spinner" class="spinner"></div>
                
                <!-- SVG CONTINUO ERROR -->
                <svg class="icon-svg error-svg" id="error-icon" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                    <path class="error-path path-1" fill="none" d="M15,15 l20,20" />
                    <path class="error-path path-2" fill="none" d="M35,15 l-20,20" />
                </svg>

                <!-- SVG CONTINUO CHECK (Línea sin cortes) -->
                <svg class="icon-svg success-svg" id="success-icon" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                    <path class="success-path" fill="none" d="M13,26 l8,9 l16,-18" />
                </svg>

                <p id="status-text" class="status-msg">Buscando código en la nube...</p>
                <button id="btn-retry" class="btn btn-primary" style="display: none;" onclick="resetModal()">Reintentar</button>
            </div>

        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const viewInput = document.getElementById('view-input');
        const viewStatus = document.getElementById('view-status');
        const codigoInput = document.getElementById('codigoInput');
        const spinner = document.getElementById('spinner');
        const errorIcon = document.getElementById('error-icon');
        const successIcon = document.getElementById('success-icon');
        const statusText = document.getElementById('status-text');
        const btnRetry = document.getElementById('btn-retry');
        const closeBtn = document.getElementById('closeBtn');

        function openModal() {
            modal.classList.add('active');
            resetModal();
            setTimeout(() => codigoInput.focus(), 300);
        }

        function closeModalConAnimacion() {
            closeBtn.classList.add('is-clicked');
            setTimeout(() => {
                modal.classList.remove('active');
                setTimeout(() => closeBtn.classList.remove('is-clicked'), 400); 
            }, 350); 
        }

        function resetModal() {
            viewInput.style.display = 'block';
            viewStatus.style.display = 'none';
            codigoInput.value = '';
            
            spinner.style.display = 'block';
            
            // Reiniciar SVGs
            errorIcon.style.display = 'none';
            errorIcon.classList.remove('show-icon');
            
            successIcon.style.display = 'none';
            successIcon.classList.remove('show-icon');
            
            statusText.style.color = ''; 
            statusText.style.textShadow = '';
            statusText.style.fontWeight = '300';

            btnRetry.style.display = 'none';
            statusText.innerText = 'Buscando código en la nube...';
        }

        function mostrarError(mensaje) {
            spinner.style.display = 'none';
            errorIcon.style.display = 'block';
            setTimeout(() => errorIcon.classList.add('show-icon'), 10);
            statusText.innerText = mensaje;
            btnRetry.style.display = 'block';
        }

        function mostrarExito(mensaje) {
            spinner.style.display = 'none';
            successIcon.style.display = 'block';
            setTimeout(() => successIcon.classList.add('show-icon'), 10);
            
            statusText.innerText = mensaje;
            statusText.style.color = 'var(--exito)';
            statusText.style.fontWeight = '800'; // Usa Nexa Heavy para el éxito
            statusText.style.textShadow = '0 0 10px rgba(6, 214, 160, 0.4)';
        }

        function buscarCodigo() {
            const codigo = codigoInput.value.trim().toUpperCase();
            
            if(codigo === '') {
                codigoInput.style.transform = 'translateX(-10px)';
                setTimeout(() => codigoInput.style.transform = 'translateX(10px)', 100);
                setTimeout(() => codigoInput.style.transform = 'translateX(0)', 200);
                return;
            }

            codigoInput.blur(); 
            viewInput.style.display = 'none';
            viewStatus.style.display = 'flex';

            fetch('codigos.json')
                .then(response => {
                    if (!response.ok) throw new Error('Error de red');
                    return response.json();
                })
                .then(data => {
                    setTimeout(() => {
                        if (data[codigo]) {
                            mostrarExito('¡Código encontrado! Redirigiendo...');
                            setTimeout(() => window.location.href = data[codigo], 1600);
                        } else {
                            mostrarError('No se encontró el código de evento.');
                        }
                    }, 1800); 
                })
                .catch(error => {
                    console.error('Error al cargar codigos.json:', error);
                    setTimeout(() => mostrarError('Error de red. Revisa tu conexión.'), 1500);
                });
        }

        codigoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') buscarCodigo();
        });
    </script>
</body>
</html>
