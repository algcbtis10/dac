<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dos A Cloud | Descarga tus fotos</title>
    <!-- Tu icono oficial -->
    <link rel="icon" type="image/png" href="assets/dosa-icon.png">

    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --blanco: #f8f8fa;
            --negro: #121212;
            --acento: #3a0ca3; 
            --acento-aux1: #4361ee;
            --acento-aux2: #7209b7;
            --exito: #06d6a0; 
            --error: #ef233c;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            /* El stack de fuentes nativo de Apple (San Francisco) */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--negro); color: var(--blanco);
            height: 100vh; width: 100vw; overflow: hidden; position: relative;
        }

        /* --- FONDO DE ORBES --- */
        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 0;
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(70px);
            animation: floatOrb 8s infinite ease-in-out alternate;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--acento); top: -5%; left: 0%; animation-duration: 10s; }
        .orb-2 { width: 300px; height: 300px; background: var(--acento-aux2); bottom: 5%; right: -5%; animation-duration: 12s; animation-delay: -3s; }
        .orb-3 { width: 250px; height: 250px; background: var(--acento-aux1); top: 40%; left: 60%; animation-duration: 8s; animation-delay: -5s; }
        .orb-4 { width: 320px; height: 320px; background: var(--acento); bottom: 20%; left: -10%; animation-duration: 11s; animation-delay: -7s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, -50px) scale(1.1); }
            66% { transform: translate(-60px, 80px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .content-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow-y: auto; padding: 20px; z-index: 10;
        }

        /* --- ULTRA LIQUID GLASS (NUEVOS BORDES Y REFRACCIÓN) --- */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(200%); 
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            
            /* Bisel exterior asimétrico simulando luz desde arriba a la izquierda */
            border-top: 1.5px solid rgba(255, 255, 255, 0.4);
            border-left: 1.5px solid rgba(255, 255, 255, 0.25);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            
            border-radius: 36px;
            
            /* Sombra múltiple: caída normal + brillos interiores simulando grosor del cristal */
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5), 
                inset 0 4px 6px rgba(255, 255, 255, 0.2), 
                inset 0 -4px 6px rgba(255, 255, 255, 0.05);
                
            padding: 45px 35px;
            text-align: center; width: 100%; max-width: 420px; flex-shrink: 0;
            animation: springIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes springIn {
            0% { opacity: 0; transform: scale(0.85) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- LOGO --- */
        .logo-img {
            max-width: 220px; width: 100%; height: auto;
            margin: 0 auto 25px auto; display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }

        .hero-description {
            margin-bottom: 30px; font-size: 16px; line-height: 1.5;
            color: rgba(248, 248, 250, 0.85); font-weight: 400; letter-spacing: -0.2px;
        }

        /* --- BOTONES --- */
        .btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.04) 100%);
            color: var(--blanco); 
            
            /* Mismo tratamiento de cristal para botones */
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid transparent;
            border-right: 1px solid transparent;
            
            padding: 16px 24px; border-radius: 50px;
            font-size: 17px; font-weight: 600; letter-spacing: -0.3px; cursor: pointer;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 100%;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.1) 100%);
            transform: scale(1.03); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.25), inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .btn:active { transform: scale(0.96); transition: all 0.1s; }

        .btn-primary {
            background: linear-gradient(135deg, var(--acento) 0%, #2b087a 100%);
            border-top: 1px solid rgba(255,255,255,0.4);
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(58, 12, 163, 0.4);
        }

        .btn-primary:hover { background: linear-gradient(135deg, #4a15c3 0%, var(--acento) 100%); }

        /* --- VENTANA MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            transform: scale(0.85) translateY(30px); opacity: 0;
            width: 100%; max-width: 420px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }

        /* --- TRANSICIONES FLUIDAS ENTRE VISTAS --- */
        .view-section {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .view-hidden {
            opacity: 0 !important;
            transform: scale(0.95) !important;
        }

        /* --- BOTÓN X CERRAR --- */
        .close-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid transparent; border-right: 1px solid transparent;
            width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease;
            z-index: 10;
        }
        .close-btn:hover { transform: scale(1.15); background: rgba(255, 255, 255, 0.2); }
        .close-btn.is-clicked { background-color: var(--error) !important; transform: scale(0.85) !important; }

        .x-icon { position: relative; width: 14px; height: 14px; transition: transform 0.4s ease; }
        .x-icon::before, .x-icon::after {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1.5px;
            background: #fff; border-radius: 2px;
        }
        .x-icon::before { transform: translateY(-50%) rotate(45deg); }
        .x-icon::after { transform: translateY(-50%) rotate(-45deg); }
        .close-btn.is-clicked .x-icon { transform: rotate(180deg); }

        /* --- INPUT --- */
        .input-code {
            width: 100%; padding: 18px; border-radius: 18px;
            background: rgba(0, 0, 0, 0.35);
            border-top: 1px solid rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--blanco); font-size: 18px; text-align: center;
            outline: none; margin-top: 15px;
            transition: all 0.3s ease; letter-spacing: 2px;
            font-weight: 500;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.5);
        }
        .input-code:focus {
            background: rgba(0, 0, 0, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.6), 0 0 20px rgba(58, 12, 163, 0.5);
        }

        /* --- LOADER --- */
        .loader-container { display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.05); border-top: 4px solid var(--acento);
            border-radius: 50%; margin-bottom: 20px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { font-size: 17px; margin-bottom: 15px; text-align: center; font-weight: 400; letter-spacing: -0.3px; transition: all 0.3s ease; }

        /* --- ANIMACIÓN ERROR X (PURO CSS) --- */
        .animated-css-error { position: relative; width: 50px; height: 50px; margin-bottom: 15px; display: none; }
        .error-leg {
            position: absolute; height: 4.5px; border-radius: 4px;
            background-color: var(--error); opacity: 0; box-shadow: 0 0 15px rgba(239, 35, 60, 0.5);
            transform-origin: center; width: 45px; top: 45%; left: 5%;
        }
        .animated-css-error.show-error .error-left { animation: drawXLeft 0.3s ease-out forwards; }
        .animated-css-error.show-error .error-right { animation: drawXRight 0.3s ease-out forwards; animation-delay: 0.15s; }

        @keyframes drawXLeft { 0% { opacity: 0; transform: rotate(45deg) scaleX(0); } 100% { opacity: 1; transform: rotate(45deg) scaleX(1); } }
        @keyframes drawXRight { 0% { opacity: 0; transform: rotate(-45deg) scaleX(0); } 100% { opacity: 1; transform: rotate(-45deg) scaleX(1); } }

        /* --- ANIMACIÓN ÉXITO CHECK (PURO CSS) --- */
        .animated-css-check { position: relative; width: 50px; height: 50px; margin-bottom: 15px; display: none; }
        .check-leg {
            position: absolute; height: 5px; border-radius: 4px;
            background-color: var(--exito); opacity: 0; 
            box-shadow: 0 0 15px rgba(6, 214, 160, 0.5);
            transform-origin: left center;
        }
        .check-short { width: 22px; top: 55%; left: 18%; }
        .check-long { width: 38px; top: 78%; left: 42%; }

        .animated-css-check.show-success .check-short { animation: drawCheckShort 0.2s ease-out forwards; }
        .animated-css-check.show-success .check-long { animation: drawCheckLong 0.25s ease-out forwards; animation-delay: 0.15s; }

        @keyframes drawCheckShort { 0% { opacity: 0; transform: rotate(45deg) scaleX(0); } 100% { opacity: 1; transform: rotate(45deg) scaleX(1); } }
        @keyframes drawCheckLong { 0% { opacity: 0; transform: rotate(-55deg) scaleX(0); } 100% { opacity: 1; transform: rotate(-55deg) scaleX(1); } }

        @media (max-width: 380px) {
            .glass-card { padding: 35px 25px; }
            .logo-img { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="content-wrapper">
        <div class="glass-card">
            <!-- RUTAS ACTUALIZADAS PARA TU CARPETA ASSETS -->
            <img src="assets/dosa-cloud.png" alt="Dos A Cloud" class="logo-img">
            
            <p class="hero-description">Accede a tu galería privada ingresando tu código de evento.</p>
            <button class="btn" onclick="openModal()">Insertar código</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="glass-card modal-content" style="animation: none; min-height: 320px; display: flex; flex-direction: column; justify-content: center;"> 
            
            <button class="close-btn" id="closeBtn" onclick="closeModalConAnimacion()">
                <span class="x-icon"></span>
            </button>
            
            <!-- VISTA 1: INPUT -->
            <div id="view-input" class="view-section">
                <h2 style="font-size: 26px; margin-bottom: 5px; font-weight: 700; letter-spacing: -0.5px;">Buscar Galería</h2>
                <p style="font-size: 15px; opacity: 0.7; font-weight: 400;">Ingresa el código proporcionado</p>
                <input type="text" id="codigoInput" class="input-code" placeholder="Ej. BODA2026" autocomplete="off">
                <button class="btn btn-primary" onclick="buscarCodigo()">Buscar código</button>
            </div>

            <!-- VISTA 2: ESTADOS (Carga, Éxito, Error) -->
            <div id="view-status" class="view-section view-hidden" style="display: none;">
                <div class="loader-container">
                    <div id="spinner" class="spinner"></div>
                    
                    <!-- CSS ERROR ANIMADO -->
                    <div id="error-icon" class="animated-css-error">
                        <div class="error-leg error-left"></div>
                        <div class="error-leg error-right"></div>
                    </div>

                    <!-- CSS CHECK ANIMADO -->
                    <div id="success-icon" class="animated-css-check">
                        <div class="check-leg check-short"></div>
                        <div class="check-leg check-long"></div>
                    </div>

                    <p id="status-text" class="status-msg">Buscando código en la nube...</p>
                    <button id="btn-retry" class="btn btn-primary" style="display: none; margin-top: 15px;" onclick="reintentarBusqueda()">Reintentar</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const viewInput = document.getElementById('view-input');
        const viewStatus = document.getElementById('view-status');
        const codigoInput = document.getElementById('codigoInput');
        const spinner = document.getElementById('spinner');
        const errorIcon = document.getElementById('error-icon');
        const successIcon = document.getElementById('success-icon');
        const statusText = document.getElementById('status-text');
        const btnRetry = document.getElementById('btn-retry');
        const closeBtn = document.getElementById('closeBtn');

        function openModal() {
            modal.classList.add('active');
            resetModalDirecto();
            setTimeout(() => codigoInput.focus(), 300);
        }

        function closeModalConAnimacion() {
            closeBtn.classList.add('is-clicked');
            setTimeout(() => {
                modal.classList.remove('active');
                setTimeout(() => {
                    closeBtn.classList.remove('is-clicked');
                    resetModalDirecto(); // Limpia por detrás para la próxima
                }, 500); 
            }, 350); 
        }

        // Motor de Transición Fluida
        function switchView(hideEl, showEl, displayStyle = 'block') {
            hideEl.classList.add('view-hidden');
            setTimeout(() => {
                hideEl.style.display = 'none';
                showEl.style.display = displayStyle;
                showEl.classList.add('view-hidden');
                
                // Forzar repintado del navegador para que ejecute la animación
                void showEl.offsetWidth; 
                
                showEl.classList.remove('view-hidden');
            }, 300); // 300ms = tiempo de la transición CSS
        }

        // Reseteo al reintentar (con animación)
        function reintentarBusqueda() {
            switchView(viewStatus, viewInput);
            setTimeout(() => {
                resetEstadosVisibles();
                codigoInput.value = '';
                codigoInput.focus();
            }, 350);
        }

        // Reseteo rápido sin animación (cuando se abre/cierra la ventana)
        function resetModalDirecto() {
            viewInput.style.display = 'block';
            viewInput.classList.remove('view-hidden');
            viewStatus.style.display = 'none';
            codigoInput.value = '';
            resetEstadosVisibles();
        }

        function resetEstadosVisibles() {
            spinner.style.display = 'block';
            
            errorIcon.style.display = 'none';
            errorIcon.classList.remove('show-error');
            
            successIcon.style.display = 'none';
            successIcon.classList.remove('show-success');
            
            statusText.style.color = ''; 
            statusText.style.textShadow = '';
            statusText.style.fontWeight = '400';

            btnRetry.style.display = 'none';
            statusText.innerText = 'Buscando código en la nube...';
        }

        function mostrarError(mensaje) {
            spinner.style.display = 'none';
            errorIcon.style.display = 'block';
            setTimeout(() => errorIcon.classList.add('show-error'), 10);
            statusText.innerText = mensaje;
            btnRetry.style.display = 'block';
        }

        function mostrarExito(mensaje) {
            spinner.style.display = 'none';
            successIcon.style.display = 'block';
            setTimeout(() => successIcon.classList.add('show-success'), 10);
            
            statusText.innerText = mensaje;
            statusText.style.color = 'var(--exito)';
            statusText.style.fontWeight = '600';
            statusText.style.textShadow = '0 0 12px rgba(6, 214, 160, 0.4)';
        }

        function buscarCodigo() {
            const codigo = codigoInput.value.trim().toUpperCase();
            
            if(codigo === '') {
                codigoInput.style.transform = 'translateX(-10px)';
                setTimeout(() => codigoInput.style.transform = 'translateX(10px)', 100);
                setTimeout(() => codigoInput.style.transform = 'translateX(0)', 200);
                return;
            }

            codigoInput.blur(); 
            
            // Ejecutamos la transición fluida hacia el loader
            switchView(viewInput, viewStatus);

            fetch('codigos.json')
                .then(response => {
                    if (!response.ok) throw new Error('Error de red');
                    return response.json();
                })
                .then(data => {
                    setTimeout(() => {
                        if (data[codigo]) {
                            mostrarExito('¡Código encontrado! Redirigiendo...');
                            setTimeout(() => window.location.href = data[codigo], 1600);
                        } else {
                            mostrarError('No se encontró el código de evento.');
                        }
                    }, 2000); 
                })
                .catch(error => {
                    console.error('Error al cargar codigos.json:', error);
                    setTimeout(() => mostrarError('Error de red. Revisa tu conexión.'), 1800);
                });
        }

        codigoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') buscarCodigo();
        });
    </script>
</body>
</html>
