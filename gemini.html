<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dos A Cloud | Descarga tus fotos</title>
    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --blanco: #f8f8fa;
            --negro: #1e1e1e;
            --acento: #3a0ca3; /* El color principal para detalles */
            --acento-aux1: #4361ee;
            --acento-aux2: #7209b7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            position: relative;
        }

        /* --- FONDO ANIMADO MUCHO MÁS FLUIDO --- */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            /* Animación más rápida y dinámica */
            animation: floatOrb 8s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: var(--acento);
            top: 5%;
            left: 10%;
            animation-duration: 9s;
        }

        .orb-2 {
            width: 280px;
            height: 280px;
            background: var(--acento-aux2);
            bottom: 10%;
            right: 5%;
            animation-duration: 11s;
            animation-delay: -2s;
        }

        .orb-3 {
            width: 220px;
            height: 220px;
            background: var(--acento-aux1);
            top: 50%;
            left: 50%;
            animation-duration: 7s;
            animation-delay: -4s;
        }
        
        .orb-4 {
            width: 250px;
            height: 250px;
            background: var(--acento);
            bottom: 30%;
            left: -5%;
            animation-duration: 10s;
            animation-delay: -6s;
        }

        /* Movimientos más amplios para el fondo */
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(80px, -60px) scale(1.15); }
            50% { transform: translate(-50px, 80px) scale(0.9); }
            75% { transform: translate(-90px, -40px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto; 
            padding: 20px;
            z-index: 10;
        }

        /* --- ESTILO LIQUID GLASS (MÁS TRANSPARENTE) --- */
        .glass-card {
            /* Opacidad reducida drásticamente (de 0.15 a 0.06) para mayor transparencia */
            background: linear-gradient(135deg, rgba(248, 248, 250, 0.06) 0%, rgba(248, 248, 250, 0.01) 100%);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            
            border-top: 1px solid rgba(248, 248, 250, 0.3);
            border-left: 1px solid rgba(248, 248, 250, 0.2);
            border-bottom: 1px solid rgba(248, 248, 250, 0.05);
            border-right: 1px solid rgba(248, 248, 250, 0.05);
            
            border-radius: 28px;
            box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(248, 248, 250, 0.03);
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            flex-shrink: 0;
            
            animation: springIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes springIn {
            0% { opacity: 0; transform: scale(0.8) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- LOGO EN VEZ DE TEXTO --- */
        .logo-img {
            max-width: 200px; /* Ajusta este tamaño según tu logo */
            width: 100%;
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        .hero-description {
            margin-bottom: 25px; 
            font-size: 15px;
            line-height: 1.5;
            color: rgba(248, 248, 250, 0.9);
        }

        /* --- BOTONES ANIMADOS (NUEVO COMPORTAMIENTO) --- */
        .btn {
            background: linear-gradient(135deg, rgba(248, 248, 250, 0.15) 0%, rgba(248, 248, 250, 0.05) 100%);
            color: var(--blanco);
            border-top: 1px solid rgba(248, 248, 250, 0.3);
            border-left: 1px solid rgba(248, 248, 250, 0.2);
            border-bottom: 1px solid transparent;
            border-right: 1px solid transparent;
            padding: 15px 24px; 
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            /* Transición fluida */
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Al pasar el mouse, solo se expande un poco (no brinca hacia arriba) */
        .btn:hover {
            background: linear-gradient(135deg, rgba(248, 248, 250, 0.25) 0%, rgba(248, 248, 250, 0.1) 100%);
            transform: scale(1.03); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* Animación profunda al hacer clic */
        .btn:active {
            transform: scale(0.94); /* Se hace más chico simulando el rebote de un botón físico */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.1s; /* Más rápido al presionar */
        }

        .btn-primary {
            /* Usamos el color de detalles exacto */
            background: linear-gradient(135deg, var(--acento) 0%, #2b087a 100%);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 20px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4a15c3 0%, var(--acento) 100%);
        }

        /* --- VENTANA MODAL LIQUID --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.4);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            transform: scale(0.7) translateY(50px);
            opacity: 0;
            width: 100%;
            max-width: 400px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* --- LA X INTERACTIVA Y GIRATORIA --- */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(248, 248, 250, 0.1);
            border: 1px solid rgba(248, 248, 250, 0.2);
            color: var(--blanco);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Eje de rotación desde una esquina para efecto bisagra/péndulo */
            transform-origin: bottom left; 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s ease;
            z-index: 10;
        }

        /* Al pasar el mouse hace un ligero péndulo */
        .close-btn:hover {
            background: rgba(248, 248, 250, 0.25);
            transform: rotate(-15deg) scale(1.1);
        }
        
        /* Al dar clic cambia a rojo y gira dramáticamente desde la esquina */
        .close-btn:active {
            background-color: #ef233c; /* Rojo */
            border-color: #ef233c;
            color: white;
            transform: rotate(-60deg) scale(0.9); 
            transition: all 0.1s; /* Reacción inmediata al clic */
        }

        /* --- INPUT --- */
        .input-code {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: rgba(18, 18, 18, 0.3);
            border: 1px solid rgba(248, 248, 250, 0.1);
            border-top: 1px solid rgba(18, 18, 18, 0.6); 
            color: var(--blanco);
            font-size: 16px; 
            text-align: center;
            outline: none;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .input-code:focus {
            background: rgba(30, 30, 30, 0.4);
            border-color: rgba(248, 248, 250, 0.3);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2), 0 0 15px rgba(58, 12, 163, 0.4);
        }

        /* --- LOADER EN COLOR "ACENTO" ESTRICTO --- */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(248, 248, 250, 0.1);
            /* Usando estrictamente el color detallado 3a0ca3 */
            border-top: 4px solid var(--acento);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-msg {
            font-size: 15px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .error-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: none;
            color: #ef233c;
            text-shadow: 0 0 15px rgba(239, 35, 60, 0.4);
            animation: springIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (max-width: 380px) {
            .glass-card { padding: 30px 20px; }
            .logo-img { max-width: 160px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="content-wrapper">
        <div class="glass-card">
            <!-- AQUÍ VA TU LOGO -->
            <!-- Solo reemplaza 'ruta-a-tu-logo.png' por el archivo de tu logo -->
            <img src="assets/dosa-cloud.png" alt="Dos A Cloud" class="logo-img">
            
            <p class="hero-description">Accede a tu galería privada ingresando tu código de evento.</p>
            <button class="btn" onclick="openModal()">Insertar código</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="glass-card modal-content" style="animation: none;"> 
            <button class="close-btn" onclick="closeModal()">✕</button>
            
            <div id="view-input">
                <h2 style="font-size: 22px; margin-bottom: 5px; font-weight: 600;">Buscar Galería</h2>
                <p style="font-size: 14px; opacity: 0.8;">Ingresa el código proporcionado</p>
                <input type="text" id="codigoInput" class="input-code" placeholder="Ej. BODA2026" autocomplete="off">
                <button class="btn btn-primary" onclick="buscarCodigo()">Buscar código</button>
            </div>

            <div id="view-status" class="loader-container">
                <div id="spinner" class="spinner"></div>
                <div id="error-icon" class="error-icon">✕</div>
                <p id="status-text" class="status-msg">Buscando código en la nube...</p>
                <button id="btn-retry" class="btn btn-primary" style="display: none;" onclick="resetModal()">Reintentar</button>
            </div>

        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const viewInput = document.getElementById('view-input');
        const viewStatus = document.getElementById('view-status');
        const codigoInput = document.getElementById('codigoInput');
        const spinner = document.getElementById('spinner');
        const errorIcon = document.getElementById('error-icon');
        const statusText = document.getElementById('status-text');
        const btnRetry = document.getElementById('btn-retry');

        function openModal() {
            modal.classList.add('active');
            resetModal();
            setTimeout(() => codigoInput.focus(), 300);
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function resetModal() {
            viewInput.style.display = 'block';
            viewStatus.style.display = 'none';
            codigoInput.value = '';
            
            spinner.style.display = 'block';
            errorIcon.style.display = 'none';
            btnRetry.style.display = 'none';
            statusText.innerText = 'Buscando código en la nube...';
        }

        function mostrarError(mensaje) {
            spinner.style.display = 'none';
            errorIcon.style.display = 'block';
            statusText.innerText = mensaje;
            btnRetry.style.display = 'block';
        }

        function buscarCodigo() {
            const codigo = codigoInput.value.trim().toUpperCase();
            
            if(codigo === '') {
                codigoInput.style.transform = 'translateX(-10px)';
                setTimeout(() => codigoInput.style.transform = 'translateX(10px)', 100);
                setTimeout(() => codigoInput.style.transform = 'translateX(0)', 200);
                return;
            }

            codigoInput.blur(); 
            viewInput.style.display = 'none';
            viewStatus.style.display = 'flex';

            fetch('codigos.json')
                .then(response => {
                    if (!response.ok) throw new Error('Error de red');
                    return response.json();
                })
                .then(data => {
                    setTimeout(() => {
                        if (data[codigo]) {
                            statusText.innerText = '¡Código encontrado! Redirigiendo...';
                            // El spinner ya no cambia de color, se mantiene en #3a0ca3
                            
                            setTimeout(() => {
                                window.location.href = data[codigo];
                            }, 1000);
                        } else {
                            mostrarError('No se encontró el código de evento.');
                        }
                    }, 1800); 
                })
                .catch(error => {
                    console.error('Error al cargar codigos.json:', error);
                    setTimeout(() => {
                        mostrarError('Error de red. Revisa tu conexión.');
                    }, 1500);
                });
        }

        codigoInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') buscarCodigo();
        });
    </script>
</body>
</html>
